services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
    restart: always

  worker:
    build: .
    command: python manage.py qcluster
    volumes:
      - .:/app
    depends_on:
      - web
    restart: always
